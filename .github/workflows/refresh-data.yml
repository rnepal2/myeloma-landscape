name: Refresh landscape data

on:
  schedule:
    - cron: "17 7 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: landscape-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python scripts/refresh_data.py
      - run: python scripts/validate_data.py
      - run: npm run format:check
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - name: Commit accepted snapshot
        run: |
          git config user.name "landscape-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet || git commit -m "data: refresh landscape snapshot"
          git push
